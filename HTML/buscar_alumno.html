<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Búsqueda de Alumno</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(-45deg,#ff0080,#7928ca,#007cf0,#00dfd8);
    background-size:400% 400%;
    animation:fondo 12s ease infinite;
    overflow:hidden;
}

@keyframes fondo{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.container{
    width:90%;
    max-width:600px;
    padding:50px;
    text-align:center;
    border-radius:30px;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.2);
    box-shadow:
        0 0 20px rgba(255,255,255,0.1),
        0 0 50px rgba(0,0,0,0.2);
    animation:entrada 1s ease;
}

@keyframes entrada{
    from{
        opacity:0;
        transform:translateY(40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

h1{
    color:white;
    font-size:3rem;
    font-weight:700;
    margin-bottom:15px;
    text-shadow:
        0 0 10px white,
        0 0 20px #00e5ff;
}

p{
    color:rgba(255,255,255,0.9);
    font-size:1.1rem;
    margin-bottom:35px;
}

button{
    border:none;
    padding:18px 40px;
    font-size:1.2rem;
    font-weight:600;
    border-radius:50px;
    cursor:pointer;
    color:white;
    background:linear-gradient(90deg,#ff00cc,#3333ff);
    transition:0.3s;
    box-shadow:
        0 0 15px #ff00cc,
        0 0 30px #3333ff;
}

button:hover{
    transform:scale(1.08);
    box-shadow:
        0 0 30px #ff00cc,
        0 0 60px #3333ff;
}

button:active{
    transform:scale(0.95);
}

#resultado{
    margin-top:35px;
    padding:20px;
    border-radius:20px;
    color:white;
    font-weight:500;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    min-height:70px;
    display:flex;
    align-items:center;
    justify-content:center;
}

body::before{
    content:"";
    position:absolute;
    width:350px;
    height:350px;
    background:#ff00cc;
    border-radius:50%;
    filter:blur(150px);
    top:-100px;
    left:-100px;
}
input{
    width:100%;
    max-width:400px;
    padding:18px 25px;
    margin:20px 0;
    border:none;
    outline:none;
    border-radius:50px;
    font-size:1rem;
    color:white;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.2);
    transition:0.3s;
    text-align:center;
    box-shadow:
        0 0 10px rgba(255,255,255,0.1);
}

input::placeholder{
    color:rgba(255,255,255,0.6);
}

input:focus{
    border:1px solid #00e5ff;
    box-shadow:
        0 0 15px #00e5ff,
        0 0 30px rgba(0,229,255,0.5);
    transform:scale(1.03);
}
body::after{
    content:"";
    position:absolute;
    width:350px;
    height:350px;
    background:#00e5ff;
    border-radius:50%;
    filter:blur(150px);
    bottom:-100px;
    right:-100px;
}
</style>
 
</head>
<body>
    <div class="container">
        <h1>Buscar Alumno</h1>
        <p>Presiona el boton e ingresa el nombre de un alumno  </p>
        <input type="text" id="nombre" name="nombre" placeholder="Ingrese el nombre del alumno">
        <button onclick="buscar_alumno()">Buscar</button>
        <h2 id="resultado"> El resultado aparecerá aquí</h2>

        </form>
    </div>

    <script>
        function buscar_alumno(){
            let alumnos = ["ana", "bruno", "carla", "diego", "elena"];
            let nombre =document.getElementById("nombre").value;
            nombre=nombre.toLowerCase();
            
            if(alumnos.includes(nombre)){
                document.getElementById("resultado").innerHTML = "Alumno "+ nombre+"  esta en la lista ";  } 
            else {
                document.getElementById("resultado").innerHTML = "Alumno "+ nombre+" no esta en la lista " ;
            }
        }
    </script>
</body>
</html>
