<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Temperatura</title>
    <style>
  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
        radial-gradient(circle at top left, #7c3aed, transparent 35%),
        radial-gradient(circle at bottom right, #06b6d4, transparent 35%),
        linear-gradient(135deg, #0f172a, #020617);
    overflow:hidden;
}

.container{
    width:100%;
    max-width:500px;
    padding:40px;
    border-radius:30px;

    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,0.15);

    box-shadow:
        0 15px 35px rgba(0,0,0,0.4),
        0 0 25px rgba(139,92,246,0.2);

    text-align:center;

    animation:entrada 1s ease;
}

@keyframes entrada{
    from{
        opacity:0;
        transform:translateY(30px) scale(.95);
    }
    to{
        opacity:1;
        transform:translateY(0) scale(1);
    }
}

h1{
    color:white;
    font-size:2.2rem;
    margin-bottom:10px;
    font-weight:700;
    text-shadow:0 0 15px rgba(255,255,255,0.3);
}


button{
    width:100%;
    margin-top:20px;
    padding:16px;

    border:none;
    border-radius:18px;

    font-size:1rem;
    font-weight:600;
    color:white;
    cursor:pointer;

    background:linear-gradient(
        135deg,
        #8b5cf6,
        #3b82f6,
        #06b6d4
    );

    background-size:300% 300%;
    animation:gradiente 5s ease infinite;

    transition:.3s;
}

@keyframes gradiente{
    0%{
        background-position:0% 50%;
    }
    50%{
        background-position:100% 50%;
    }
    100%{
        background-position:0% 50%;
    }
}

button:hover{
    transform:translateY(-4px);
    box-shadow:
        0 10px 25px rgba(59,130,246,.5),
        0 0 20px rgba(139,92,246,.5);
}

button:active{
    transform:scale(.97);
}

#resultado{
    margin-top:25px;
    padding:20px;

    border-radius:20px;

    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.1);

    color:white;
    font-size:1.15rem;
    font-weight:600;

    min-height:70px;

    display:flex;
    justify-content:center;
    align-items:center;

    box-shadow:
        inset 0 1px 2px rgba(255,255,255,.1),
        0 0 20px rgba(255,255,255,.05);

    transition:.3s;
}

#resultado:hover{
    transform:scale(1.02);
}

body::before{
    content:"";
    position:absolute;
    width:350px;
    height:350px;
    background:#8b5cf6;
    filter:blur(140px);
    opacity:.25;
    top:-100px;
    left:-100px;
}

body::after{
    content:"";
    position:absolute;
    width:350px;
    height:350px;
    background:#06b6d4;
    filter:blur(140px);
    opacity:.25;
    bottom:-100px;
    right:-100px;
}
</style>
</head>
<body>
     <div class="container">
        <h1>Conversor de Temperatura</h1>
        <button onclick="convertir()">Convertir a Fahrenheit y Kelvin</button>
        <p id="resultado">El resultado aparecerá aquí</p>
        <script>
            function convertir() {
                let celsius=prompt("Ingrese la temperatura en grados Celsius:");
                celsius=Number(celsius);
                let fahrenheit = (celsius * 1.8) + 32;
                let kelvin=celsius+273.15;
                document.getElementById("resultado").innerHTML=
                    celsius+"°C equivalen a "+ fahrenheit +"°F y "+kelvin+"K";
                
            }
        </script>
   </div>
</body>
</html>
