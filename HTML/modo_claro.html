<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modo Claro y Oscuro</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:#f8fafc;

    transition:0.5s ease;
}

.container{
    width:90%;
    max-width:500px;

    padding:60px 40px;
    text-align:center;

    background:white;

    border-radius:30px;

    box-shadow:
    0 15px 40px rgba(0,0,0,.15);

    transition:.4s;
}

.container:hover{
    transform:translateY(-5px);
}

h1{
    font-size:4rem;
    font-weight:800;
    color:#0f172a;
}

#modo{
    color:#2563eb;
}

h2{
    margin-top:10px;
    margin-bottom:40px;

    color:#475569;
    font-weight:400;
}

button{
    padding:15px 35px;

    border:none;
    border-radius:15px;

    background:#2563eb;
    color:white;

    font-size:1rem;
    font-weight:700;

    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-4px);
    box-shadow:0 10px 25px rgba(0,0,0,.2);
}

/* MODO OSCURO */

.oscuro{
    background:#0f172a;
}

.oscuro .container{
    background:#1e293b;
}

.oscuro h1{
    color:white;
}

.oscuro h2{
    color:#cbd5e1;
}

.oscuro #modo{
    color:#38bdf8;
}

.oscuro button{
    background:#38bdf8;
    color:white;
}

</style>
</head>

<body>

<div class="container">

    <h1>Modo</h1>
    <h1 id="modo">Claro</h1>

    <h2>Ahora la página está en modo claro</h2>

    <button onclick="modo()">
        Cambiar a modo oscuro
    </button>

</div>

<script>
let oscuro= false;
    function modo(){

        

        if(oscuro==true){
            document.body.style.background="white";
            document.getElementById("modo").textContent = "Claro";
            document.querySelector("h2").textContent =
            "Ahora la página está en modo claro";
            document.querySelector("button").textContent =
            "Cambiar a modo oscuro";
            oscuro=false
        }
        else{
            document.getElementById("modo").textContent = "Oscuro";
            document.body.style.background="black";
            document.querySelector("h2").textContent =
            "Ahora la página está en modo oscuro";
            document.querySelector("button").textContent =
            "Cambiar a modo claro";
            oscuro=true
        }

    }

    </script>

</body>
</html>
